<!DOCTYPE html>
<html lang="pt-br">
<head>

<body>
    <h1>Exemplo de Formulario</h1>

            <label for="icor">Cor <input type="color" name="Cor" id="icor"></label>

        </p>
        <p>

            <input type="reset" value="Apagar">
        </p>
    </form>
</body>

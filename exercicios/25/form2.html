<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Teste</h1>
    <form action="cadastro.html" method="post">
        <p>
            <label for="iusu">Usuario:</label required >
            <input type="text" name="usu" id="iusu" required placeholder="seu nome babaca" autocomplete="username">
        </p>
        <p>
            <label for="isenh">Senha</label>
            <input type="password" name="senha" id="isenh" required  placeholder="sua senha idiota"
            autocomplete="current-password">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>

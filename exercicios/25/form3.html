<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form3</title>
</head>
<body>
    <h1>TESTE</h1>
    <form action="cadastro.html">
        
            <p>
                <label for="inome">Nome:</label>
                <input type="text" name="NOME" id="inome" placeholder="Nome Completo">
            </p>   
            <p>
                <label for="imedia">Media</label>
                <input type="number" name="media" id="imedia" min="0" max="10"
                placeholder="0 a 10" step="0.1">
            </p>
            <p>
                <label for="idata">Data</label>
                <input type="month" name="data" id="idata">
            </p>
            <p>
                <label for="idia">Dia</label>
                <input type="date" name="dia" id="idia">
            </p>
            <p>
                <input type="submit">
                <input type="reset">
            </p>
    </form>
</body>
</html>

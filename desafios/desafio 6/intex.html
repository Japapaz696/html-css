<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em html5,podemos inserir os elementos da lista a seguir.Passe o mouse <br>
        sobre os termos para descobrir qual tag devera utilizar em cada caso</p>
    <ul type="square"> 
        <li><abbr title="Use a tag <p>">Paragrafo </abbr></li>
        <li><abbr title="Use a tag <title>">Titulo</abbr></li>
        <li><abbr title="Use a tag <abbr>">Abreviações</abbr></li>
        <li><abbr title="Use a tag <codi>">Codigo fonte</abbr></li>
        <li><abbr title="Use a tag <ol> <li>">Lista numerada</abbr></li>
        <li><abbr title="Use a tag <ul> <li>">Lista com marcadores</abbr></li>
</ul> 
</body>
</html>
